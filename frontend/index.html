<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>Simultaneous Translation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main class="app">

    <header class="app-bar">
        <div class="app-bar-lead">
            <span class="material-symbols-outlined app-bar-icon">graphic_eq</span>
            <div class="brand">
                <h1>Simultaneous Translation</h1>
                <p>Streaming wait-k translation for Indian languages — output begins before the sentence ends.</p>
            </div>
        </div>
        <div class="status-wrap">
            <span id="status" class="status"></span>
            <span class="meta">sarvam-translate · Gemma 3</span>
        </div>
    </header>

    <section class="console">

        <div class="controls">
            <div class="pair">
                <label class="select-field">
                    <select id="src-lang" class="select" aria-label="Source language"></select>
                </label>
                <button id="swap" class="icon-btn swap" title="Swap languages" aria-label="Swap languages">
                    <span class="material-symbols-outlined">swap_horiz</span>
                </button>
                <label class="select-field">
                    <select id="tgt-lang" class="select" aria-label="Target language"></select>
                </label>
            </div>
            <div class="lag">
                <label for="k-slider">Latency</label>
                <input type="range" id="k-slider" min="1" max="5" step="1" value="3">
                <span id="k-display" class="lag-value">wait-3</span>
            </div>
        </div>

        <div class="io">
            <div class="pane">
                <span class="pane-label" id="src-label">Telugu</span>
                <div class="field">
                    <textarea id="source-input" spellcheck="false"
                              placeholder="Type, or speak…"></textarea>
                    <div class="field-actions">
                        <div id="waveform" class="waveform" aria-hidden="true"></div>
                        <button id="clear-btn" class="text-btn" title="Clear & stop">Clear</button>
                        <button id="mic-btn" class="mic fab" title="Speak" aria-label="Speak"></button>
                    </div>
                </div>
                <div class="examples" id="examples"></div>
            </div>

            <div class="pane out">
                <span class="pane-label" id="tgt-label">English</span>
                <div class="field">
                    <div id="translation-output" class="translation"></div>
                </div>
                <div class="readout" id="readout"></div>
            </div>
        </div>

    </section>

</main>
<script src="/static/app.js"></script>
</body>
</html>
